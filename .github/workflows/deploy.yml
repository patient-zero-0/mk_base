name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: 构建并发布
    runs-on: ubuntu-latest

    steps:
      - name: Checkout（含 submodule）
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Quartz 4.5+ 要求 node >= 22 / npm >= 10.9
          node-version: "22"
          cache: "npm"
          cache-dependency-path: .quartz-runtime/package-lock.json

      # ── 安装 Quartz 依赖 ─────────────────────────────────────────────────
      - name: Install Quartz dependencies
        working-directory: .quartz-runtime
        run: npm ci

      # ── 把项目内容复制到 Quartz 的 content/ 目录 ────────────────────────
      - name: Copy MK_Base 内容到 Quartz content/
        run: |
          set -e
          cp -r analysis algebra _cross refs .quartz-runtime/content/
          cp _meta/index.md .quartz-runtime/content/index.md
          cp quartz.config.ts .quartz-runtime/quartz.config.ts

      # ── Quartz 构建（KaTeX 在构建期完成渲染） ───────────────────────────
      - name: Build（Quartz → 静态 HTML）
        working-directory: .quartz-runtime
        run: npx quartz build
        env:
          NODE_ENV: production
          CLOUDFLARE_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_ANALYTICS_TOKEN }}

      # ── 推送至 Cloudflare Pages ───────────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: mk-base
          directory: .quartz-runtime/public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      # ── 构建失败时发邮件告警（可选，未配 MAIL_* secrets 则跳过） ────────
      - name: 构建失败告警
        if: failure() && env.MAIL_USERNAME != ''
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          subject: "❌ MK_Base 构建失败 · ${{ github.sha }}"
          body: |
            Cloudflare Pages 构建失败。

            Commit: ${{ github.sha }}
            触发者: ${{ github.actor }}
            查看日志: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            main 分支线上内容未受影响（Cloudflare Pages 保留上一次成功构建）。
