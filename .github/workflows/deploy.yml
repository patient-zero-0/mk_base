name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: 构建并发布
    runs-on: ubuntu-latest

    # cloudflare/pages-action 需要 deployments:write 才能在 GitHub 创建 Deployment 记录
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout（含 submodule）
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Quartz 4.5+ 要求 node >= 22 / npm >= 10.9
          node-version: "22"
          cache: "npm"
          cache-dependency-path: .quartz-runtime/package-lock.json

      # ── 安装 Quartz 依赖 ─────────────────────────────────────────────────
      - name: Install Quartz dependencies
        working-directory: .quartz-runtime
        run: npm ci

      # ── 把项目内容复制到 Quartz 的 content/ 目录 ────────────────────────
      - name: Copy MK_Base 内容到 Quartz content/
        run: |
          set -e
          cp -r analysis algebra _cross refs .quartz-runtime/content/
          cp _meta/index.md .quartz-runtime/content/index.md
          cp quartz.config.ts .quartz-runtime/quartz.config.ts

      # ── Quartz 构建（KaTeX 在构建期完成渲染） ───────────────────────────
      - name: Build（Quartz → 静态 HTML）
        working-directory: .quartz-runtime
        run: npx quartz build
        env:
          NODE_ENV: production

      # ── 注入 Cloudflare Web Analytics beacon ───────────────────────────────
      # Quartz 4.5+ 不支持 cloudflare provider，CF Pages 自动注入对 Direct Upload
      # 部署不可靠，故在 build 后手动把 beacon 标签 sed 进每个 HTML 的 </head> 前。
      # 仅在配置了 Secret 时执行，否则跳过（不阻塞部署）。
      - name: Inject Cloudflare Web Analytics beacon
        if: env.CF_ANALYTICS_TOKEN != ''
        env:
          CF_ANALYTICS_TOKEN: ${{ secrets.CLOUDFLARE_ANALYTICS_TOKEN }}
        run: |
          set -e
          BEACON_TAG="<script defer src=\"https:\/\/static.cloudflareinsights.com\/beacon.min.js\" data-cf-beacon='{\"token\":\"${CF_ANALYTICS_TOKEN}\"}'><\/script>"
          find .quartz-runtime/public -name "*.html" -type f \
            -exec sed -i "s|</head>|${BEACON_TAG}</head>|" {} +

          # 验证：随机抽 1 个 HTML 文件确认 beacon 标签已注入；
          # 同时统计含 beacon 的文件数（避免 sed 静默失败）
          TOTAL=$(find .quartz-runtime/public -name "*.html" -type f | wc -l)
          INJECTED=$(grep -rl "data-cf-beacon" .quartz-runtime/public --include="*.html" | wc -l)
          echo "✅ 已注入 beacon：$INJECTED / $TOTAL HTML 文件"
          if [ "$INJECTED" -ne "$TOTAL" ] || [ "$TOTAL" -eq 0 ]; then
            echo "❌ 注入数与文件总数不一致或文件为空，构建中止"
            exit 1
          fi

      # ── 推送至 Cloudflare Pages ───────────────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: mk-base
          directory: .quartz-runtime/public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      # ── 构建失败时发邮件告警（可选，未配 MAIL_* secrets 则跳过） ────────
      - name: 构建失败告警
        if: failure() && env.MAIL_USERNAME != ''
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          subject: "❌ MK_Base 构建失败 · ${{ github.sha }}"
          body: |
            Cloudflare Pages 构建失败。

            Commit: ${{ github.sha }}
            触发者: ${{ github.actor }}
            查看日志: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            main 分支线上内容未受影响（Cloudflare Pages 保留上一次成功构建）。
